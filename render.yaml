services:
  - type: web
    name: arcant-api
    env: node
    nodeVersion: 20
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm start -w apps/api
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  - type: worker
    name: arcant-bot
    env: node
    nodeVersion: 20
    buildCommand: npm install && npm run build -w apps/bot
    startCommand: npm start -w apps/bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
