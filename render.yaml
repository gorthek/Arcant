services:
  - type: web
    name: arcant-api
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build -w apps/api
    startCommand: npm start -w apps/api
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"

  - type: web
    name: arcant-bot
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build -w apps/bot
    startCommand: npm start -w apps/bot
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DISCORD_TOKEN
        sync: false
